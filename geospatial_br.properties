datasetfieldtype.geographicCoverage.description=Informações sobre a cobertura geográfica dos dados. Inclui o escopo geográfico total dos dados.
datasetfieldtype.country.description=O país ou nação a que se refere o Conjunto de Dados.
datasetfieldtype.state.description=O estado ou província a que se refere o Conjunto de Dados. Use GeoNames para grafia correta e evite abreviações.
datasetfieldtype.city.description=O nome da cidade a que se refere o Conjunto de Dados. Use GeoNames para grafia correta e evite abreviações.
datasetfieldtype.otherGeographicCoverage.description=Outras informações sobre a cobertura geográfica dos dados.
datasetfieldtype.geographicUnit.description=Nível mais baixo de agregação geográfica coberta pelo Conjunto de Dados, ex.: vila, município, região.
datasetfieldtype.geographicBoundingBox.description=A descrição geométrica fundamental para qualquer Conjunto de Dados que modele geografia é a caixa delimitadora geográfica. Ela descreve a menor caixa, definida pelas longitudes oeste e leste e latitudes norte e sul, que inclui a maior extensão geográfica da cobertura do Conjunto de Dados. Este elemento é usado na primeira etapa de uma busca baseada em coordenadas. A inclusão deste elemento no codebook é recomendada, mas é obrigatória se o polígono delimitador for incluído.
datasetfieldtype.westLongitude.description=Coordenada mais a oeste delimitando a extensão geográfica do Conjunto de Dados. Faixa válida de valores, expressa em graus decimais: -180,0 <= Valor da Longitude Oeste <= 180,0.
datasetfieldtype.eastLongitude.description=Coordenada mais a leste delimitando a extensão geográfica do Conjunto de Dados. Faixa válida de valores, expressa em graus decimais: -180,0 <= Valor da Longitude Leste <= 180,0.
datasetfieldtype.northLatitude.description=Coordenada mais ao norte delimitando a extensão geográfica do Conjunto de Dados. Faixa válida de valores, expressa em graus decimais: -90,0 <= Valor da Latitude Norte <= 90,0.
datasetfieldtype.southLatitude.description=Coordenada mais ao sul delimitando a extensão geográfica do Conjunto de Dados. Faixa válida de valores, expressa em graus decimais: -90,0 <= Valor da Latitude Sul <= 90,0.
