harvestserver.noSets.why.header=O que é um Servidor de Coleta?
harvestserver.noSets.why.reason1=Coleta é um processo de troca de metadados com outros repositórios. Como um <b><i>servidor</i></b> de coleta, seu Dataverse pode disponibilizar alguns dos metadados locais de conjuntos de dados para clientes de coleta remotos. Estes podem ser outras instâncias do Dataverse, ou quaisquer outros clientes que suportem o protocolo de coleta OAI-PMH.
harvestserver.noSets.why.reason2=Apenas os conjuntos de dados publicados e irrestritos em seu Dataverse podem ser coletados. Clientes remotos normalmente mantêm seus registros em sincronia através de atualizações incrementais agendadas, diárias ou semanais, minimizando assim a carga em seu servidor. Observe que são apenas os metadados que são coletados. Os coletores remotos geralmente não tentarão baixar os próprios arquivos de dados.
harvestserver.noSets.how.header=Como executar um Servidor de Coleta?
harvestserver.noSets.how.tip1=O servidor de coleta pode ser habilitado ou desabilitado nesta página.
harvestserver.noSets.how.tip2=Uma vez que o serviço estiver habilitado, você pode definir coleções de conjuntos de dados locais que estarão disponíveis para coletores remotos como <i>Conjuntos OAI</i>. Os conjuntos são definidos por consultas de pesquisa (por exemplo, nomeDoAutor:king; ou idDoPai:1234 - para selecionar todos os conjuntos de dados que pertencem ao dataverse especificado; ou idPersistenteds: "doi:1234/" para selecionar todos os conjuntos de dados com a autoridade de identificador persistente especificada). Consulte a seção de API de Pesquisa do Guia do Usuário do Dataverse para obter mais informações sobre as consultas de pesquisa.
harvestserver.noSets.getStarted=Para começar, habilite o servidor OAI e clique no botão Adicionar Conjunto. Para saber mais sobre Coleta, visite a seção <a href="{0}/{1}/admin/dashboard.html#harvesting" title="Coleta - Guia do Administrador do Dataverse" target="_blank">Coleta</a> na página do Painel de Controle do Guia do Administrador.
