harvestclients.title=Gerenciar Clientes de Coleta
harvestclients.toptip=A coleta pode ser programada para ocorrer em um horário específico ou sob demanda. Ela pode ser iniciada aqui ou via API REST.
harvestclients.noClients.label=Nenhum cliente configurado.
harvestclients.noClients.why.header=O que é Coleta?
harvestclients.noClients.why.reason1=A coleta é um processo de troca de metadados com outros repositórios. Como <b><i>cliente</i></b> de coleta, seu Dataverse reúne registros de metadados de fontes remotas — que podem ser outras instâncias de Dataverse ou arquivos que suportam OAI-PMH.
harvestclients.noClients.why.reason2=Metadados coletados são pesquisáveis pelos usuários. Clicar em um conjunto de dados coletado leva o usuário ao repositório original. Conjuntos coletados não podem ser editados em sua instalação Dataverse.
harvestclients.noClients.how.header=Como Usar Coleta
harvestclients.noClients.how.tip1=Para coletar metadados, um <i>Cliente de Coleta</i> deve ser criado e configurado para cada repositório remoto. Observe que será necessário selecionar um dataverse local existente para hospedar os conjuntos coletados.
harvestclients.noClients.how.tip2=Registros coletados podem ser mantidos sincronizados com o repositório original por atualizações incrementais programadas — por exemplo, diariamente ou semanalmente. Alternativamente, a coleta pode ser executada sob demanda.
harvestclients.noClients.getStarted=Para começar, clique no botão Adicionar Cliente acima. Para saber mais, visite a seção <a href="{0}/{1}/admin/dashboard.html#harvesting" title="Harvesting - Dataverse Admin Guide" target="_blank">Coleta</a> na página de Painel do Guia de Administração.
