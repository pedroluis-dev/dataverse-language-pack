harvestclients.title=Gerenciar Clientes de Coleta
harvestclients.toptip=A coleta pode ser agendada para rodar em um horário específico ou sob demanda. A coleta pode ser iniciada aqui ou via API REST.
harvestclients.noClients.label=Nenhum cliente está configurado.
harvestclients.noClients.why.header=O que é Coleta?
harvestclients.noClients.why.reason1=Coleta é um processo de troca de metadados com outros repositórios. Como um <b><i>cliente</i></b> de coleta, seu Dataverse reúne registros de metadados de fontes remotas. Podem ser outras instâncias do Dataverse, ou outros arquivos que suportam OAI-PMH, o protocolo de coleta padrão. 
harvestclients.noClients.why.reason2=Os registros de metadados coletados podem ser pesquisados pelos usuários. Clicar em um conjunto de dados coletado nos resultados da pesquisa leva o usuário ao repositório original. Os conjuntos de dados coletados não podem ser editados na sua instalação do Dataverse. 
harvestclients.noClients.how.header=Como Usar a Coleta
harvestclients.noClients.how.tip1=Para coletar metadados, um <i>Cliente de Coleta</i> é criado e configurado para cada repositório remoto. Observe que ao criar um cliente, você precisará selecionar um dataverse local existente para hospedar os conjuntos de dados coletados.
harvestclients.noClients.how.tip2=Os registros coletados podem ser mantidos em sincronia com o repositório original através de atualizações incrementais agendadas, por exemplo, diariamente ou semanalmente. Alternativamente, as coletas podem ser executadas sob demanda, a partir desta página ou via API REST.
harvestclients.noClients.getStarted=Para começar, clique no botão Adicionar Cliente acima. Para saber mais sobre Coleta, visite a seção <a href="{0}/{1}/admin/dashboard.html#harvesting" title="Coleta - Guia do Administrador do Dataverse" target="_blank">Coleta</a> na página do Painel de Controle do Guia do Administrador.
