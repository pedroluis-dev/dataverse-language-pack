datasetfieldtype.unitOfAnalysis.description=Unidade básica de análise ou observação que este Conjunto de Dados descreve, como indivíduos, famílias/domicílios, grupos, instituições/organizações, unidades administrativas e outros. Para informações sobre o vocabulário controlado do DDI para este elemento, consulte a página do DDI em http://www.ddialliance.org/controlled-vocabularies.
datasetfieldtype.universe.description=Descrição da população coberta pelos dados no arquivo; o grupo de pessoas ou outros elementos que são objeto do estudo e aos quais os resultados se referem. Idade, nacionalidade e residência geralmente ajudam a definir um universo, mas diversos outros fatores podem ser usados, como limites de idade, sexo, estado civil, raça, grupo étnico, nacionalidade, renda, status de veterano, condenações criminais, e mais. O universo pode consistir em elementos que não sejam pessoas, como unidades habitacionais, processos judiciais, óbitos, países etc. Em geral, deve ser possível identificar, a partir da descrição do universo, se um indivíduo ou elemento pertence à população estudada. Também conhecido como universo de interesse, população de interesse ou população alvo.
datasetfieldtype.timeMethod.description=O método temporal ou dimensão temporal da coleta de dados, como painel, transversal, tendência, série temporal ou outro.
datasetfieldtype.dataCollector.description=Indivíduo, agência ou organização responsável por administrar o questionário ou entrevista, ou compilar os dados.
datasetfieldtype.collectorTraining.description=Tipo de treinamento fornecido ao coletor de dados
datasetfieldtype.frequencyOfDataCollection.description=Se os dados coletados incluem mais de um ponto no tempo, indicar a frequência com que os dados foram coletados; por exemplo, mensal, trimestral ou outro.
datasetfieldtype.samplingProcedure.description=Tipo de amostra e desenho amostral usados para selecionar os respondentes da pesquisa que representam a população. Pode incluir referência ao tamanho da amostra alvo e à fração amostral.
datasetfieldtype.targetSampleSize.description=Informações específicas sobre o tamanho da amostra alvo, tamanho real da amostra e a fórmula usada para determiná-lo.
datasetfieldtype.targetSampleActualSize.description=Tamanho real da amostra.
datasetfieldtype.targetSampleSizeFormula.description=Fórmula usada para determinar o tamanho da amostra alvo.
datasetfieldtype.deviationsFromSampleDesign.description=Mostrar correspondências, bem como discrepâncias, entre as unidades amostrais obtidas e as estatísticas disponíveis para a população (idade, razão de sexo, estado civil etc.) como um todo.
datasetfieldtype.collectionMode.description=Método usado para coletar os dados; características da instrumentação (ex.: entrevista telefônica, questionário por correio ou outro).
datasetfieldtype.researchInstrument.description=Tipo de instrumento de coleta de dados utilizado. Estruturado indica um instrumento em que todos os respondentes são submetidos às mesmas perguntas/testes, possivelmente com respostas pré-codificadas. Se uma pequena parte do questionário incluir perguntas abertas, forneça comentários apropriados. Semiestruturado indica que o instrumento de pesquisa contém principalmente perguntas abertas. Não estruturado indica que foram realizadas entrevistas em profundidade.
datasetfieldtype.dataCollectionSituation.description=Descrição de aspectos relevantes da situação de coleta de dados. Inclui informações sobre fatores como cooperação dos respondentes, duração das entrevistas, número de retornos de contato ou similares.
datasetfieldtype.actionsToMinimizeLoss.description=Resumo das ações tomadas para minimizar a perda de dados. Inclui informações sobre ações como visitas de acompanhamento, verificações de supervisores, correspondência histórica, estimativas etc.
datasetfieldtype.controlOperations.description=Operações de controle realizadas pelo pesquisador principal ou pelo arquivo de dados para facilitar o controle.
datasetfieldtype.weighting.description=O uso de procedimentos de amostragem pode tornar necessário aplicar pesos para produzir resultados estatísticos precisos. Descreve os critérios para usar pesos na análise da coleta. Se uma fórmula ou coeficiente de ponderação foi desenvolvido, a fórmula é fornecida, seus elementos são definidos e é indicado como foi aplicada aos dados.
datasetfieldtype.cleaningOperations.description=Métodos usados para limpar a coleta de dados, como verificação de consistência, verificação de códigos incorretos ou outros.
datasetfieldtype.datasetLevelErrorNotes.description=Elemento de nota usado para qualquer informação que anote ou esclareça a metodologia e o processamento do estudo.
datasetfieldtype.responseRate.description=Percentual dos membros da amostra que forneceram informações.
datasetfieldtype.samplingErrorEstimates.description=Medida de quão precisamente é possível estimar um valor populacional a partir de uma amostra.
datasetfieldtype.otherDataAppraisal.description=Outros aspectos relacionados à avaliação dos dados. Descreva questões como variância de resposta, taxa de não resposta e testes de viés, viés do entrevistador e do respondente, níveis de confiança, viés de perguntas ou similares.
