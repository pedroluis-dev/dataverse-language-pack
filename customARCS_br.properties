datasetfieldtype.ARCS1.title=1) Algum desses conjuntos de dados foi a) adquirido por compra, b) obtido por meio de bases de dados licenciadas, ou c) fornecido por uma organização sob acordo de confidencialidade ou outro tipo de acordo?
datasetfieldtype.ARCS2.title=2) Caso tenha respondido Sim à P1, você garantiu que o compartilhamento dos dados não viola os termos do acordo? Caso tenha respondido Não à P1, informe N/A aqui.
datasetfieldtype.ARCS3.title=3) Algum desses conjuntos de dados inclui dados em nível individual (coletados ou pré-existentes no conjunto de dados) que possam torná-los sujeitos a considerações sobre pesquisa com seres humanos nos Estados Unidos ou internacionalmente?
datasetfieldtype.ARCS4.title=4) Caso tenha respondido Sim à P3, esses conjuntos de dados estão totalmente desidentificados ou o compartilhamento foi aprovado pelo seu comitê institucional de ética em pesquisa (IRB)? Caso tenha respondido Não à P3, informe N/A aqui.
datasetfieldtype.ARCS5.title=5) Esses conjuntos de dados contêm informações sensíveis ou informações privadas pessoalmente identificáveis? (A Política de Segurança de Dados de Pesquisa da Universidade de Harvard {www.security.harvard.edu/research-data-security-policy} pode ser aplicável, pois este Dataverse é hospedado pela Universidade de Harvard.)
