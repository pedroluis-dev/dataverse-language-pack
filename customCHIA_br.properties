datasetfieldtype.sourceCHIA.description=Fonte - Descreve a origem dos dados. Trata-se de dados do Bureau of Labor and Statistics? São dados provenientes das Nações Unidas?
datasetfieldtype.datesAdditionalInformationCHIA.description=Datas - Informações adicionais - Registre quaisquer informações complementares sobre datas ou períodos temporais no conjunto de dados, incluindo intervalos (anuais, decenais, centenários, etc.). Indique também a(s) coluna(s) do conjunto de dados em que as datas e outras informações temporais podem ser localizadas.
datasetfieldtype.variablesCHIA.description=Variáveis - Defina as variáveis deste conjunto de dados. Indique a coluna do conjunto de dados em que as informações sobre as variáveis podem ser encontradas.
datasetfieldtype.classificationSchemaCHIA.description=Esquema de classificação - Caso exista um esquema de classificação neste conjunto de dados, descreva-o. Por exemplo, M_20_24 deve ser interpretado como Masculino, faixa etária de 20 a 24 anos.
datasetfieldtype.provenanceCHIA.description=Proveniência - A proveniência dos conjuntos de dados corresponde ao registro de sua titularidade e será utilizada como referência para avaliação da autenticidade ou da qualidade dos dados. Por exemplo, a declaração de proveniência pode ser: "Este conjunto de dados foi elaborado a partir de informações coletadas por David Ruvolo durante uma viagem de coleta de dados à Espanha em 1992. Desde então, os dados não foram alterados, exceto para migração a formatos mais atuais."
datasetfieldtype.rightsAvailabilityCHIA.description=Direitos/Disponibilidade - Você detém os direitos necessários para compartilhar estes dados?
